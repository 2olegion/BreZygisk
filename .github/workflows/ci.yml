name: Untrusted CI

on:
  pull_request:
  merge_group:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: "recursive"
          fetch-depth: 0

      - name: Setup NDK_PATH
        run: echo "NDK_PATH=$ANDROID_NDK_LATEST_HOME" >> $GITHUB_ENV

      - name: Build
        run: |
          make all -j$(nproc)

      - name: Debug output
        if: always()
        run: |
          echo "=== build/out contents ==="
          ls -la build/out/ 2>/dev/null || echo "build/out does not exist"
          echo "=== build/ contents ==="
          ls -la build/ 2>/dev/null || echo "build/ does not exist"
          echo "=== find all zips ==="
          find . -name "*.zip" 2>/dev/null || echo "no zips found"

      - name: Upload release
        uses: actions/upload-artifact@v4
        with:
          name: release
          path: "build/out/ReZygisk-v*-release.zip"
          if-no-files-found: error

      - name: Upload debug
        uses: actions/upload-artifact@v4
        with:
          name: debug
          path: "build/out/ReZygisk-v*-debug.zip"
          if-no-files-found: warn
